<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大阪紹介</title>
    <base href="/" />

    <script>
        (() => {
            const storageKey = "uiux-soft2-theme";

            function normalizeTheme(theme) {
                return theme === "dark" ? "dark" : "light";
            }

            function getSystemTheme() {
                return window.matchMedia("(prefers-color-scheme: dark)").matches
                    ? "dark"
                    : "light";
            }

            function getStoredTheme() {
                try {
                    return localStorage.getItem(storageKey);
                } catch {
                    return null;
                }
            }

            function saveTheme(theme) {
                try {
                    localStorage.setItem(storageKey, theme);
                } catch {
                }
            }

            function getTheme() {
                const storedTheme = getStoredTheme();
                const htmlTheme = document.documentElement.getAttribute("data-theme");
                const theme = storedTheme || htmlTheme || getSystemTheme();

                return normalizeTheme(theme);
            }

            function updateToggleLabel(theme) {
                const labels = document.querySelectorAll("[data-theme-label]");
                const buttons = document.querySelectorAll("[data-theme-toggle]");

                labels.forEach((label) => {
                    label.textContent = theme === "dark" ? "Dark" : "Light";
                });

                buttons.forEach((button) => {
                    button.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
                });
            }

            function applyTheme(theme) {
                const normalizedTheme = normalizeTheme(theme);

                document.documentElement.setAttribute("data-theme", normalizedTheme);
                document.documentElement.style.colorScheme = normalizedTheme;

                updateToggleLabel(normalizedTheme);

                return normalizedTheme;
            }

            function setTheme(theme) {
                const normalizedTheme = applyTheme(theme);

                saveTheme(normalizedTheme);

                return normalizedTheme;
            }

            function initTheme() {
                const theme = getStoredTheme() || getSystemTheme();

                applyTheme(theme);
            }

            function toggleTheme() {
                const currentTheme = getTheme();
                const nextTheme = currentTheme === "dark" ? "light" : "dark";

                setTheme(nextTheme);
            }

            initTheme();

            window.appTheme = {
                getTheme,
                setTheme,
                applyTheme,
                initTheme,
                toggleTheme
            };
        })();
    </script>

    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="uiux_soft2.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading">Loading...</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>

    <script>
        window.addEventListener("pageshow", () => {
            window.appTheme.initTheme();
        });

        window.appModal = {
            setupFocusTrap: function (modalSelector) {
                const modal = document.querySelector(modalSelector);
                if (!modal) return;

                window.appModal._lastFocusedElement = document.activeElement;
                document.body.classList.add("modal-open");

                const focusableElements = modal.querySelectorAll("button, [href], input, select, textarea, [tabindex]:not([tabindex='-1'])");
                if (focusableElements.length === 0) return;

                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];
                const closeBtn = modal.querySelector(".topic-modal-close");

                if (closeBtn) {
                    closeBtn.focus();
                } else {
                    firstElement.focus();
                }

                const handleKeyDown = function (e) {
                    if (e.key === "Tab") {
                        if (e.shiftKey) {
                            if (document.activeElement === firstElement) {
                                lastElement.focus();
                                e.preventDefault();
                            }
                        } else if (document.activeElement === lastElement) {
                            firstElement.focus();
                            e.preventDefault();
                        }
                    }
                };

                modal._focusTrapListener = handleKeyDown;
                modal.addEventListener("keydown", handleKeyDown);
            },
            removeFocusTrap: function (modalSelector) {
                document.body.classList.remove("modal-open");

                const modal = document.querySelector(modalSelector);
                if (modal && modal._focusTrapListener) {
                    modal.removeEventListener("keydown", modal._focusTrapListener);
                    delete modal._focusTrapListener;
                }

                if (window.appModal._lastFocusedElement && typeof window.appModal._lastFocusedElement.focus === "function") {
                    window.appModal._lastFocusedElement.focus();
                    delete window.appModal._lastFocusedElement;
                }
            }
        };

        window.appFavorites = {
            storageKey: "uiux-soft2-favorites",
            get: function () {
                try {
                    const value = localStorage.getItem(window.appFavorites.storageKey);
                    const parsed = value ? JSON.parse(value) : [];

                    return Array.isArray(parsed)
                        ? parsed.filter((id) => typeof id === "string")
                        : [];
                } catch {
                    return [];
                }
            },
            set: function (articleIds) {
                try {
                    const safeIds = Array.isArray(articleIds)
                        ? articleIds.filter((id) => typeof id === "string")
                        : [];

                    localStorage.setItem(window.appFavorites.storageKey, JSON.stringify(safeIds));
                } catch {
                }
            }
        };

        window.appClipboard = {
            _pendingCopies: new Map(),
            copyText: async function (text) {
                return await window.appClipboard._copyText(text);
            },
            prepareCopy: function (text) {
                const value = text ?? "";
                const pendingCopy = window.appClipboard._copyText(value);

                window.appClipboard._pendingCopies.set(value, pendingCopy);
                pendingCopy.finally(() => {
                    setTimeout(() => {
                        if (window.appClipboard._pendingCopies.get(value) === pendingCopy) {
                            window.appClipboard._pendingCopies.delete(value);
                        }
                    }, 2000);
                });
            },
            getPreparedResult: async function (text) {
                const value = text ?? "";
                const pendingCopy = window.appClipboard._pendingCopies.get(value);

                if (!pendingCopy) {
                    return null;
                }

                try {
                    return await pendingCopy;
                } finally {
                    if (window.appClipboard._pendingCopies.get(value) === pendingCopy) {
                        window.appClipboard._pendingCopies.delete(value);
                    }
                }
            },
            _copyText: async function (text) {
                try {
                    const value = text ?? "";

                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(value);
                        return true;
                    }

                    const textarea = document.createElement("textarea");
                    textarea.value = value;
                    textarea.setAttribute("readonly", "");
                    textarea.style.position = "fixed";
                    textarea.style.left = "0";
                    textarea.style.top = "0";
                    textarea.style.width = "1px";
                    textarea.style.height = "1px";
                    textarea.style.opacity = "0";

                    document.body.appendChild(textarea);
                    try {
                        textarea.focus({ preventScroll: true });
                    } catch {
                        textarea.focus();
                    }
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);

                    const copied = document.execCommand("copy");
                    document.body.removeChild(textarea);

                    return copied;
                } catch {
                    return false;
                }
            }
        };

        document.addEventListener("pointerdown", (event) => {
            const target = event.target instanceof Element ? event.target : event.target.parentElement;
            const copyButton = target?.closest("[data-copy-text]");
            if (copyButton) {
                window.appClipboard.prepareCopy(copyButton.dataset.copyText);
            }
        }, true);

        document.addEventListener("keydown", (event) => {
            if (event.key !== "Enter" && event.key !== " ") {
                return;
            }

            const target = event.target instanceof Element ? event.target : event.target.parentElement;
            const copyButton = target?.closest("[data-copy-text]");
            if (copyButton) {
                window.appClipboard.prepareCopy(copyButton.dataset.copyText);
            }
        }, true);

    </script>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
